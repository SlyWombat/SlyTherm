; PlatformIO project for the Dettson ClimateTalk Thermostat.
; See docs/05-firmware-plan.md. Secrets come from .env -> generated config (never committed).
;
; Envs:
;   sniffer    - Phase 1/2 RX-only bus sniffer + web admin console for the
;                ESP32-DevKitC bench rig (src/main_sniffer.cpp, issue #57)
;   thermostat - the bootable thermostat application (src/main_thermostat.cpp, issue #55);
;                actuator stubbed/logging by default — see the bench notes in that file
;   native     - host-side unit tests for all pure-C++ modules in lib/ (no hardware)
;
; Layout convention:
;   lib/<Module>/   pure C++17, NO Arduino.h, time injected as uint32_t now_ms (testable on host)
;   src/            firmware entrypoints + Arduino-dependent glue only
;   test/test_*/    Unity tests, run with: pio test -e native

[platformio]
default_envs = sniffer

; Each ESP32 env selects exactly one entrypoint via build_src_filter so the
; sniffer and thermostat mains never collide in one image.
[env:sniffer]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_sniffer.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
; links2004/WebSockets (+ the core's stock WebServer) chosen over
; ESPAsyncWebServer: runs synchronously in the loop task, so no AsyncTCP
; task preempts the byte pump's micros() gap measurement and no cross-task
; locking is needed on the capture buffer/counters.
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    links2004/WebSockets@^2.4.1

; Bootable thermostat app (issue #55). esp32dev DevKitC for the bench now,
; esp32s3 display board later. Optional feature flags (all default OFF; see
; src/thermostat_config.h):
;   -DDETTSON_CT485_UART      real UART2/DE glue for the CT-485 task (else stubbed)
;   -DDETTSON_CT485_TX_ENABLE allow CT-485 TX + resume() (Phase 3 gate; needs UART)
;   -DDETTSON_ACTUATOR_CT485  route demands to Ct485Thermostat (refused while
;                             OffsetVariant is kUnset — the docs/02 §5a gate)
;   -DDETTSON_ACTUATOR_RELAY  Case B RelaySequencer + GPIO actuator
[env:thermostat]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_thermostat.cpp>
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    knolleary/PubSubClient
    bblanchon/ArduinoJson

; Production wall unit (issue #37): the full thermostat control app +
; the LVGL wall UI, on the Waveshare ESP32-S3-Touch-LCD-4.3B. Same
; demands-disabled safety default as [env:thermostat]; -DDETTSON_UI adds the
; UI task (src/slytherm_ui.cpp) driven by the control task's UiModel.
[env:thermostat_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_thermostat.cpp> +<slytherm_ui.cpp> +<wifi_prov.cpp> +<mqtt_cfg.cpp> +<telnet_log.cpp> +<slymark_img.c> +<font_now80.c> +<font_set48.c>
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DDETTSON_UI
    ; RS-485 LISTEN capture (#71): onboard isolated auto-direction transceiver
    ; on GPIO43(RX)/GPIO44(TX). Enables the real UART2 glue in ct485Task.
    -DDETTSON_CT485_UART
    -std=gnu++17
    -DLV_CONF_SKIP=1
    -DLV_COLOR_DEPTH=16
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_48=1
    -DLV_USE_LOG=0
    -DLV_USE_SNAPSHOT=1
    ; System 12 h trend graph (#76): the chart widget is otherwise trimmed.
    -DLV_USE_CHART=1
    ; Gradient cache: default 0 (with LV_CONF_SKIP) makes lv_draw_sw_gradient
    ; allocate_item() hang the render task -> task WDT -> boot-loop whenever ANY
    ; gradient renders (default-theme widgets on the nav overlay / a full
    ; lv_scr_load redraw). Give it a real buffer so gradients allocate cleanly.
    -DLV_GRAD_CACHE_DEF_SIZE=8192
    -DLV_DITHER_GRADIENT=0
    ; Dark default theme so stock widgets (list, keyboard, textarea) match the
    ; design system instead of rendering white-on-black.
    -DLV_THEME_DEFAULT_DARK=1
    ; Trim unused LVGL features so it compiles a fraction of its files (faster
    ; builds). We use only labels/buttons/list/textarea/keyboard/tabview.
    -DLV_BUILD_EXAMPLES=0
    -DLV_USE_QRCODE=0
    -DLV_USE_GIF=0
    -DLV_USE_BMP=0
    -DLV_USE_PNG=0
    -DLV_USE_SJPG=0
    -DLV_USE_FFMPEG=0
    -DLV_USE_RLOTTIE=0
    -DLV_USE_FREETYPE=0
    -DLV_USE_FS_STDIO=0
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    lvgl/lvgl@^8.4.0
    lovyan03/LovyanGFX@^1.1.16

; ESP32-S3 sniffer for the Waveshare ESP32-S3-Touch-LCD-4.3B (issue #57).
; Identical RX-only firmware as [env:sniffer] (same src/main_sniffer.cpp); only
; the board + RX pin differ (kRxPin is keyed on CONFIG_IDF_TARGET_ESP32S3 in
; src/sniffer_config.h). This bare env has NO display — it is the
; high-confidence "web console works" build. Octal PSRAM is enabled so the
; _display env below can allocate the RGB framebuffer.
[env:sniffer_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_sniffer.cpp>
; Drop the framework's default gnu++11 so our -std=gnu++17 wins (the lib/
; modules use C++14+ generic lambdas) — same fix as [env:thermostat].
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    ; Waveshare board has only native USB — route Serial to the USB-Serial/JTAG
    ; CDC so serial logs appear on the same USB-C used to flash (COM port).
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    links2004/WebSockets@^2.4.1

; Adds the on-screen dashboard (src/sniffer_display.cpp) via Arduino_GFX. The
; RGB pin map, panel timing and CH422G backlight/reset are lifted from the
; Waveshare 4.3 reference example but are NOT bench-verified here — if the
; panel is blank/garbled, see the HARDWARE-VERIFY notes in sniffer_display.cpp.
; The sniffer + web console are unaffected by any display issue.
[env:sniffer_s3_display]
extends = env:sniffer_s3
build_src_filter = +<main_sniffer.cpp> +<sniffer_display.cpp>
build_flags =
    ${env:sniffer_s3.build_flags}
    -DSNIFFER_DISPLAY
lib_deps =
    ${env:sniffer_s3.lib_deps}
    ; Pin 1.3.x: 1.4.x requires the Arduino-ESP32 3.x core (esp32-hal-periman.h),
    ; but this espressif32 platform ships the 2.0.x core. 1.3.x keeps the
    ; Arduino_ESP32RGBPanel RGB support without that dependency.
    moononournation/GFX Library for Arduino@~1.3.1

; Stage 1 of the wall-unit UI (issue #37): LVGL + RGB-panel + GT911 touch smoke
; test on the Waveshare board (src/main_ui_smoke.cpp). Proves the flush/touch
; stack before the real screens; throwaway once ui/lvgl lands. LVGL uses its
; built-in defaults (LV_CONF_SKIP) with a few -D overrides — no lv_conf.h.
[env:ui_smoke_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_ui_smoke.cpp>
build_unflags = -std=gnu++11
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -DLV_CONF_SKIP=1
    -DLV_COLOR_DEPTH=16
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_USE_LOG=0
lib_deps =
    lvgl/lvgl@^8.4.0
    moononournation/GFX Library for Arduino@~1.3.1

; Wall-unit UI (issue #37), stage 2+: the real LVGL multi-screen UI bound to
; lib/UiModel (src/main_ui_s3.cpp). Standalone for now — a demo control-echo
; drives the screens; later folds into main_thermostat.cpp's control task.
[env:thermostat_ui_s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_ui_s3.cpp>
build_unflags = -std=gnu++11
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -DLV_CONF_SKIP=1
    -DLV_COLOR_DEPTH=16
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_48=1
    -DLV_USE_LOG=0
lib_deps =
    lvgl/lvgl@^8.4.0
    lovyan03/LovyanGFX@^1.1.16

[env:native]
platform = native
build_flags = -std=c++17 -Wall -Wextra
test_framework = unity
