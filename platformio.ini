; PlatformIO project for the Dettson ClimateTalk Thermostat (ESP32, Arduino framework).
; See docs/05-firmware-plan.md. Secrets come from .env -> generated config.h (never committed).

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    knolleary/PubSubClient
    bblanchon/ArduinoJson

; Offline unit tests for Ct485Frame (Fletcher) and Ct485Parser against captured logs.
[env:native]
platform = native
build_flags = -std=c++17
