; PlatformIO project for the Dettson ClimateTalk Thermostat.
; See docs/05-firmware-plan.md. Secrets come from .env -> generated config (never committed).
;
; Envs:
;   sniffer    - Phase 1/2 RX-only bus sniffer + web admin console for the
;                ESP32-DevKitC bench rig (src/main_sniffer.cpp, issue #57)
;   thermostat - the bootable thermostat application (src/main_thermostat.cpp, issue #55);
;                actuator stubbed/logging by default — see the bench notes in that file
;   native     - host-side unit tests for all pure-C++ modules in lib/ (no hardware)
;
; Layout convention:
;   lib/<Module>/   pure C++17, NO Arduino.h, time injected as uint32_t now_ms (testable on host)
;   src/            firmware entrypoints + Arduino-dependent glue only
;   test/test_*/    Unity tests, run with: pio test -e native

[platformio]
default_envs = sniffer

; Each ESP32 env selects exactly one entrypoint via build_src_filter so the
; sniffer and thermostat mains never collide in one image.
[env:sniffer]
; #113: inject SLYTHERM_FW_VERSION/_FW_BUILD from the root VERSION file + git sha
extra_scripts = pre:tools/version_flag.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip  ; PINNED by URL: registry has no 55.x (pioarduino); CI/WSL/kdocker2 must agree
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_sniffer.cpp>
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
; links2004/WebSockets (+ the core's stock WebServer) chosen over
; ESPAsyncWebServer: runs synchronously in the loop task, so no AsyncTCP
; task preempts the byte pump's micros() gap measurement and no cross-task
; locking is needed on the capture buffer/counters.
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    links2004/WebSockets@^2.4.1

; Bootable thermostat app (issue #55). esp32dev DevKitC for the bench now,
; esp32s3 display board later. Optional feature flags (all default OFF; see
; src/thermostat_config.h):
;   -DSLYTHERM_CT485_UART      real UART2/DE glue for the CT-485 task (else stubbed)
;   -DSLYTHERM_CT485_TX_ENABLE allow CT-485 TX + resume() (Phase 3 gate; needs UART)
;   -DSLYTHERM_ACTUATOR_CT485  route demands to Ct485Thermostat (refused while
;                             OffsetVariant is kUnset — the docs/02 §5a gate)
;   -DSLYTHERM_ACTUATOR_RELAY  Case B RelaySequencer + GPIO actuator
[env:thermostat]
; #113: inject SLYTHERM_FW_VERSION/_FW_BUILD from the root VERSION file + git sha
extra_scripts = pre:tools/version_flag.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip  ; PINNED by URL: registry has no 55.x (pioarduino); CI/WSL/kdocker2 must agree
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_thermostat.cpp> +<boot_guard.cpp> +<coredump_server.cpp>
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    knolleary/PubSubClient
    bblanchon/ArduinoJson

; Production wall unit (issue #37): the full thermostat control app +
; the LVGL wall UI, on the Waveshare ESP32-S3-Touch-LCD-4.3B. Same
; demands-disabled safety default as [env:thermostat]; -DSLYTHERM_UI adds the
; UI task (src/slytherm_ui.cpp) driven by the control task's UiModel.
[env:thermostat_s3]
; #113: inject SLYTHERM_FW_VERSION/_FW_BUILD from the root VERSION file + git sha
extra_scripts = pre:tools/version_flag.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip  ; PINNED by URL: registry has no 55.x (pioarduino); CI/WSL/kdocker2 must agree
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
; #114 split: slytherm_ui.cpp is the slim orchestrator; screens live in
; src/ui/ (portable) + ui_port_s3.cpp (this board's display/touch port).
build_src_filter = +<main_thermostat.cpp> +<boot_guard.cpp> +<coredump_server.cpp> +<slytherm_ui.cpp> +<ui/ui_shared.cpp> +<ui/ui_main.cpp> +<ui/ui_overlays.cpp> +<ui/ui_modes.cpp> +<ui/ui_port_s3.cpp> +<wifi_prov.cpp> +<mqtt_cfg.cpp> +<telnet_log.cpp> +<ota_client.cpp> +<slymark_img.c> +<font_now80.c> +<font_set48.c>
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DSLYTHERM_UI
    ; Production Controller features (formerly opt-in via PLATFORMIO_BUILD_FLAGS):
    ; the v0.4.0 CI release shipped WITHOUT them because they never lived in the
    ; env -- an OTA onto that image is a one-way door off the OTA train (no
    ; client on the new image). Unconditional since v0.4.1 (#104/#61).
    -DSLYTHERM_REMOTE_LINK
    -DSLYTHERM_OTA
    ; OTA identity (#60/#61): which catalog entry this build resolves to.
    -DSLYTHERM_OTA_TARGET='"wall-s3"'
    -DSLYTHERM_OTA_HWREV='"s3-43b-r1.1"'
    ; RS-485 LISTEN capture (#71): onboard isolated auto-direction transceiver
    ; on GPIO43(RX)/GPIO44(TX). Enables the real UART2 glue in ct485Task.
    -DSLYTHERM_CT485_UART
    -std=gnu++17
    -DLV_CONF_SKIP=1
    -DLV_COLOR_DEPTH=16
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_48=1
    -DLV_USE_LOG=0
    -DLV_USE_SNAPSHOT=1
    ; System 12 h trend graph (#76): the chart widget is otherwise trimmed.
    -DLV_USE_CHART=1
    ; Gradient cache: default 0 (with LV_CONF_SKIP) makes lv_draw_sw_gradient
    ; allocate_item() hang the render task -> task WDT -> boot-loop whenever ANY
    ; gradient renders (default-theme widgets on the nav overlay / a full
    ; lv_scr_load redraw). Give it a real buffer so gradients allocate cleanly.
    -DLV_GRAD_CACHE_DEF_SIZE=8192
    -DLV_DITHER_GRADIENT=0
    ; LVGL heap: default (~48K under LV_CONF_SKIP) was exhausted by all the screens
    ; (StoreProhibited on full-UI boot). Real headroom -- in PSRAM: the static
    ; internal-RAM pool left only ~17K free heap and the OTA client's TLS
    ; handshake (#61) needs ~45K (mbedtls alloc failed). Object allocs tolerate
    ; PSRAM; the render DRAW BUFFER stays internal RAM in the ui port (latency-
    ; critical -- do not move it). Same recipe as env:remote_p4 below.
    -DLV_MEM_CUSTOM=1
    -DLV_MEM_CUSTOM_INCLUDE='"esp32-hal-psram.h"'
    -DLV_MEM_CUSTOM_ALLOC=ps_malloc
    -DLV_MEM_CUSTOM_REALLOC=ps_realloc
    -DLV_MEM_CUSTOM_FREE=free
    -DLV_MEM_SIZE=98304
    ; LVGL's printf drops %f by default (LV_CONF_SKIP) -> lv_label_set_text_fmt
    ; with "%.0f" rendered "heat f°". Enable float formatting.
    -DLV_SPRINTF_USE_FLOAT=1
    ; Dark default theme so stock widgets (list, keyboard, textarea) match the
    ; design system instead of rendering white-on-black.
    -DLV_THEME_DEFAULT_DARK=1
    ; Trim unused LVGL features so it compiles a fraction of its files (faster
    ; builds). We use only labels/buttons/list/textarea/keyboard/tabview.
    -DLV_BUILD_EXAMPLES=0
    -DLV_USE_QRCODE=0
    -DLV_USE_GIF=0
    -DLV_USE_BMP=0
    -DLV_USE_PNG=0
    -DLV_USE_SJPG=0
    -DLV_USE_FFMPEG=0
    -DLV_USE_RLOTTIE=0
    -DLV_USE_FREETYPE=0
    -DLV_USE_FS_STDIO=0
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    lvgl/lvgl@^8.4.0
    lovyan03/LovyanGFX@^1.1.16

; ESP32-S3 sniffer for the Waveshare ESP32-S3-Touch-LCD-4.3B (issue #57).
; Identical RX-only firmware as [env:sniffer] (same src/main_sniffer.cpp); only
; the board + RX pin differ (kRxPin is keyed on CONFIG_IDF_TARGET_ESP32S3 in
; src/sniffer_config.h). This bare env has NO display — it is the
; high-confidence "web console works" build. Octal PSRAM is enabled so the
; _display env below can allocate the RGB framebuffer.
[env:sniffer_s3]
; #113: inject SLYTHERM_FW_VERSION/_FW_BUILD from the root VERSION file + git sha
extra_scripts = pre:tools/version_flag.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip  ; PINNED by URL: registry has no 55.x (pioarduino); CI/WSL/kdocker2 must agree
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_sniffer.cpp>
; Drop the framework's default gnu++11 so our -std=gnu++17 wins (the lib/
; modules use C++14+ generic lambdas) — same fix as [env:thermostat].
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    ; Waveshare board has only native USB — route Serial to the USB-Serial/JTAG
    ; CDC so serial logs appear on the same USB-C used to flash (COM port).
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    knolleary/PubSubClient
    bblanchon/ArduinoJson
    links2004/WebSockets@^2.4.1

; Adds the on-screen dashboard (src/sniffer_display.cpp) via Arduino_GFX. The
; RGB pin map, panel timing and CH422G backlight/reset are lifted from the
; Waveshare 4.3 reference example but are NOT bench-verified here — if the
; panel is blank/garbled, see the HARDWARE-VERIFY notes in sniffer_display.cpp.
; The sniffer + web console are unaffected by any display issue.
[env:sniffer_s3_display]
extends = env:sniffer_s3
build_src_filter = +<main_sniffer.cpp> +<sniffer_display.cpp>
build_flags =
    ${env:sniffer_s3.build_flags}
    -DSNIFFER_DISPLAY
lib_deps =
    ${env:sniffer_s3.lib_deps}
    ; Pin 1.3.x: 1.4.x requires the Arduino-ESP32 3.x core (esp32-hal-periman.h),
    ; but this espressif32 platform ships the 2.0.x core. 1.3.x keeps the
    ; Arduino_ESP32RGBPanel RGB support without that dependency.
    moononournation/GFX Library for Arduino@~1.3.1

; Stage 1 of the wall-unit UI (issue #37): LVGL + RGB-panel + GT911 touch smoke
; test on the Waveshare board (src/main_ui_smoke.cpp). Proves the flush/touch
; stack before the real screens; throwaway once ui/lvgl lands. LVGL uses its
; built-in defaults (LV_CONF_SKIP) with a few -D overrides — no lv_conf.h.
[env:ui_smoke_s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip  ; PINNED by URL: registry has no 55.x (pioarduino); CI/WSL/kdocker2 must agree
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_ui_smoke.cpp>
build_unflags = -std=gnu++11
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -DLV_CONF_SKIP=1
    -DLV_COLOR_DEPTH=16
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_USE_LOG=0
lib_deps =
    lvgl/lvgl@^8.4.0
    moononournation/GFX Library for Arduino@~1.3.1

; Wall-unit UI (issue #37), stage 2+: the real LVGL multi-screen UI bound to
; lib/UiModel (src/main_ui_s3.cpp). Standalone for now — a demo control-echo
; drives the screens; later folds into main_thermostat.cpp's control task.
[env:thermostat_ui_s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip  ; PINNED by URL: registry has no 55.x (pioarduino); CI/WSL/kdocker2 must agree
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
upload_speed = 921600
build_src_filter = +<main_ui_s3.cpp>
build_unflags = -std=gnu++11
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -std=gnu++17
    -DLV_CONF_SKIP=1
    -DLV_COLOR_DEPTH=16
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_48=1
    -DLV_USE_LOG=0
lib_deps =
    lvgl/lvgl@^8.4.0
    lovyan03/LovyanGFX@^1.1.16

; Remote node (issue #94 epic, #95): wall-mounted ESP32-P4 (Guition JC-ESP32P4-M3),
; NO RS-485/CT-485 — talks to the Controller only over WiFi/MQTT. See
; docs/11-remote-node-plan.md. The stock `espressif32` platform (v7.0.1, Arduino
; core 2.0.17) has no P4 support at all — P4 needs Arduino core 3.x, only shipped by
; the pioarduino platform fork. Pinned to a real release (not the rolling "stable"
; pointer) for reproducible builds; bump deliberately.
; board = boards/jc_esp32p4_m3.json (project-local; PlatformIO auto-discovers
; boards/*.json). Based on Espressif's esp32-p4_r3-evboard.json (chip_variant
; "esp32p4" = production rev.301, NOT the "_es" engineering-sample variant) — this
; project's actual P4 (COM6) was probed with esptool and reported "revision v1.3",
; i.e. production silicon, so the ES board file would be the wrong pick.
[env:remote_p4]
; #113: inject SLYTHERM_FW_VERSION/_FW_BUILD from the root VERSION file + git sha
extra_scripts = pre:tools/version_flag.py
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = jc_esp32p4_m3
framework = arduino
; Full UI + fonts blew the default 1.25MB app slot; single big app partition
; (same table the remote_p4_c6_fw_update helper needed).
board_build.partitions = default_16MB.csv
monitor_speed = 115200
upload_speed = 1500000
; #114 split: the Remote compiles the SAME portable UI modules as the
; Controller, swapping only the board port (ui_port_p4 vs ui_port_s3).
; wifi_prov/telnet_log are portable and required by the shared screens;
; wifi_prov owns the radio (#121): NVS creds -> compiled-in dev fallback ->
; first-run Welcome/WiFi-setup (remote_wifi retired; its BSSID pinning and
; retry backoff moved into wifi_prov behind SLYTHERM_WIFI_PIN_BSSID).
build_src_filter = +<main_remote.cpp> +<boot_guard.cpp> +<coredump_server.cpp> +<remote_mqtt.cpp> +<remote_net_guard.cpp> +<ota_client.cpp> +<mqtt_cfg.cpp> +<slytherm_ui.cpp> +<ui/ui_shared.cpp> +<ui/ui_main.cpp> +<ui/ui_overlays.cpp> +<ui/ui_modes.cpp> +<ui/ui_port_p4.cpp> +<wifi_prov.cpp> +<telnet_log.cpp> +<slymark_img.c> +<font_now80.c> +<font_set48.c>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
    ; #111: on-device OTA from the shared GitHub catalog. UNGATED apply --
    ; no furnace on this node (otaSafeToReboot() returns true in
    ; main_remote.cpp). default_16MB.csv is already dual-app (#64).
    -DSLYTHERM_OTA
    -DSLYTHERM_OTA_TARGET='"remote-p4"'
    -DSLYTHERM_OTA_HWREV='"p4-m3-r1"'
    ; #121: strongest-BSSID pin + rescan-on-failure + retry backoff in
    ; wifi_prov (Remote-only flag; the Controller binary is untouched).
    -DSLYTHERM_WIFI_PIN_BSSID
    ; LVGL config: mirror env:thermostat_s3 exactly — the shared screens
    ; assume these fonts/features and the hard-won heap/gradient sizing.
    -DLV_CONF_SKIP=1
    -DLV_COLOR_DEPTH=16
    -DLV_FONT_MONTSERRAT_16=1
    -DLV_FONT_MONTSERRAT_20=1
    -DLV_FONT_MONTSERRAT_28=1
    -DLV_FONT_MONTSERRAT_48=1
    -DLV_USE_LOG=0
    -DLV_USE_SNAPSHOT=1
    -DLV_USE_CHART=1
    -DLV_GRAD_CACHE_DEF_SIZE=8192
    -DLV_DITHER_GRADIENT=0
    ; LVGL pool: the Controller's 96KB is ALREADY near-exhausted by the
    ; screens; the P4 additionally draws its sw-rotation chunk buffer from
    ; this pool (lv_mem_buf_get), and a failed LVGL alloc = assert-while(1)
    ; = task-WDT boot loop. A bigger static pool starved the internal heap
    ; instead (6KB free -> OOM reboot). The P4 has 32MB PSRAM — back the
    ; whole LVGL pool with ps_malloc and keep internal SRAM for WiFi/MQTT.
    ; (The line draw buffer stays internal — it's a static in ui_port_p4.)
    -DLV_MEM_CUSTOM=1
    -DLV_MEM_CUSTOM_INCLUDE='"esp32-hal-psram.h"'
    -DLV_MEM_CUSTOM_ALLOC=ps_malloc
    -DLV_MEM_CUSTOM_FREE=free
    -DLV_MEM_CUSTOM_REALLOC=ps_realloc
    -DLV_SPRINTF_USE_FLOAT=1
    -DLV_THEME_DEFAULT_DARK=1
    -DLV_BUILD_EXAMPLES=0
    -DLV_USE_QRCODE=0
    -DLV_USE_GIF=0
    -DLV_USE_BMP=0
    -DLV_USE_PNG=0
    -DLV_USE_SJPG=0
    -DLV_USE_FFMPEG=0
    -DLV_USE_RLOTTIE=0
    -DLV_USE_FREETYPE=0
    -DLV_USE_FS_STDIO=0
lib_deps =
    lvgl/lvgl@^8.4.0
    knolleary/PubSubClient

; One-time repair sketch (issue #96): pushes updated esp_hosted slave firmware
; to the onboard ESP32-C6 directly over SDIO (no WiFi needed). Run once per
; board, then reflash env:remote_p4. See main_c6_flash_helper.cpp and
; tools/fetch_c6_hosted_fw.sh (generates the gitignored blob this needs).
[env:remote_p4_c6_fw_update]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.39/platform-espressif32.zip
board = jc_esp32p4_m3
framework = arduino
board_build.partitions = default_16MB.csv
monitor_speed = 115200
upload_speed = 1500000
build_src_filter = +<main_c6_flash_helper.cpp>
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17

[env:native]
platform = native
build_flags = -std=c++17 -Wall -Wextra
test_framework = unity
; test_sleep_state exercises behavior dc6a1bb deliberately neutralized
; (SleepState::update always returns not-asleep -- #90 crashed on the
; sleep-preset edge and is queued for a presence-aware reimplementation).
; The suite documents the DESIRED behavior; ignored until #90 lands.
test_ignore = test_sleep_state
