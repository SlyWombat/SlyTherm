<svg xmlns="http://www.w3.org/2000/svg" width="940" height="430" viewBox="0 0 940 430">
  <rect x="0" y="0" width="940" height="430" fill="#ffffff"/>
  <text x="470" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#111111">Power chain — 24 VAC wall supply to the controller</text>

  <!-- Transformer -->
  <rect x="20" y="90" width="170" height="90" fill="#f7f7f0" stroke="#444444" stroke-width="2" rx="6"/>
  <text x="105" y="118" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#111111">Furnace transformer</text>
  <text x="105" y="138" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555555">24 VAC nominal, ~40 VA</text>
  <text x="105" y="156" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#555555">28–30 VAC light-load → 40 V+ pk</text>

  <!-- R line with fuse -->
  <line x1="190" y1="110" x2="270" y2="110" stroke="#cc7700" stroke-width="2.5"/>
  <text x="212" y="100" font-family="sans-serif" font-size="12" font-weight="bold" fill="#cc7700">R</text>
  <rect x="270" y="96" width="110" height="28" fill="#fffbe8" stroke="#996600" stroke-width="1.5" rx="4"/>
  <text x="325" y="114" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#996600">fuse 250–500 mA (T)</text>
  <line x1="380" y1="110" x2="470" y2="110" stroke="#cc7700" stroke-width="2.5"/>

  <!-- C line -->
  <line x1="190" y1="165" x2="470" y2="165" stroke="#cc7700" stroke-width="2.5"/>
  <text x="212" y="184" font-family="sans-serif" font-size="12" font-weight="bold" fill="#cc7700">C</text>

  <!-- MOV across R-C -->
  <rect x="408" y="120" width="34" height="36" fill="#ffffff" stroke="#996600" stroke-width="1.5" rx="4"/>
  <text x="425" y="142" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#996600">MOV</text>
  <line x1="425" y1="110" x2="425" y2="120" stroke="#996600" stroke-width="1.5"/>
  <line x1="425" y1="156" x2="425" y2="165" stroke="#996600" stroke-width="1.5"/>
  <text x="412" y="190" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#996600">~40–47 VAC working</text>

  <!-- Isolated AC/DC -->
  <rect x="470" y="80" width="220" height="120" fill="#eefbee" stroke="#226622" stroke-width="2" rx="6"/>
  <text x="580" y="106" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#226622">ISOLATED AC/DC converter</text>
  <text x="580" y="124" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#226622">AC input 9–36 VAC (≥ 50 V rated)</text>
  <text x="580" y="140" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#226622">output 5 V ≥ 1 A (~5 W)</text>
  <line x1="580" y1="150" x2="580" y2="196" stroke="#226622" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="580" y="186" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#226622">galvanic isolation barrier</text>

  <!-- 5V out -->
  <line x1="690" y1="110" x2="760" y2="110" stroke="#2255aa" stroke-width="2.5"/>
  <text x="722" y="100" font-family="sans-serif" font-size="12" font-weight="bold" fill="#2255aa">5 V</text>
  <line x1="690" y1="165" x2="760" y2="165" stroke="#2255aa" stroke-width="2.5"/>
  <text x="690" y="184" font-family="sans-serif" font-size="10" font-weight="bold" fill="#2255aa">isolated GND</text>

  <!-- bulk caps -->
  <rect x="716" y="120" width="30" height="36" fill="#ffffff" stroke="#2255aa" stroke-width="1.5" rx="4"/>
  <text x="731" y="138" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#2255aa">470–</text>
  <text x="731" y="150" font-family="sans-serif" font-size="10" text-anchor="middle" fill="#2255aa">1000 µF</text>
  <line x1="731" y1="110" x2="731" y2="120" stroke="#2255aa" stroke-width="1.5"/>
  <line x1="731" y1="156" x2="731" y2="165" stroke="#2255aa" stroke-width="1.5"/>

  <!-- Controller -->
  <rect x="760" y="80" width="160" height="120" fill="#f4f8ff" stroke="#2255aa" stroke-width="2" rx="6"/>
  <text x="840" y="108" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2255aa">DT-1 controller</text>
  <text x="840" y="128" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#555555">5 V / VIN input</text>
  <text x="840" y="146" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">+ 0.1 µF at the board</text>
  <text x="840" y="164" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">brownout detector enabled</text>
  <text x="840" y="182" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">≤ ~3 VA total draw</text>

  <!-- warnings -->
  <rect x="20" y="240" width="900" height="172" fill="#fff4f0" stroke="#bb4422" stroke-width="1.5" rx="6"/>
  <text x="40" y="266" font-family="sans-serif" font-size="13" font-weight="bold" fill="#bb4422">Rules that protect the furnace:</text>
  <text x="40" y="290" font-family="sans-serif" font-size="12" fill="#bb4422">• Isolation is mandatory — furnace boards often half-wave-rectify with C shared; a non-isolated converter</text>
  <text x="52" y="307" font-family="sans-serif" font-size="12" fill="#bb4422">or a DC-GND-to-C bond can short a half-cycle and blow the furnace control fuse.</text>
  <text x="40" y="331" font-family="sans-serif" font-size="12" fill="#bb4422">• Do NOT bond the controller's DC ground to C anywhere. The only bus-side reference is via the RS-485</text>
  <text x="52" y="348" font-family="sans-serif" font-size="12" fill="#bb4422">barrier (or ~100 Ω) — see the bus section.</text>
  <text x="40" y="372" font-family="sans-serif" font-size="12" fill="#bb4422">• Fuse stays well below the furnace's own control fuse: a fault blows this fuse, never the furnace's.</text>
  <text x="52" y="389" font-family="sans-serif" font-size="12" fill="#bb4422">Backlight inrush may need 500 mA instead of 250 mA.</text>
</svg>
