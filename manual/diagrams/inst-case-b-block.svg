<svg xmlns="http://www.w3.org/2000/svg" width="940" height="660" viewBox="0 0 940 660">
  <rect x="0" y="0" width="940" height="660" fill="#ffffff"/>
  <text x="470" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#111111">Case B — Hybrid installation (Gree FLEXX, 24 V outdoor-unit control)</text>

  <!-- Wall unit -->
  <rect x="20" y="60" width="305" height="540" fill="#f4f8ff" stroke="#2255aa" stroke-width="2" rx="8"/>
  <text x="172" y="84" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#2255aa">DT-1 wall unit</text>

  <rect x="40" y="100" width="265" height="50" fill="#ffffff" stroke="#444444" stroke-width="1.5" rx="5"/>
  <text x="172" y="121" font-family="sans-serif" font-size="13" text-anchor="middle" fill="#111111">ESP32-S3 touchscreen controller</text>
  <text x="172" y="138" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">CT-485 gas demand · 24 V HP sequencing</text>

  <rect x="40" y="164" width="265" height="44" fill="#ffffff" stroke="#444444" stroke-width="1.5" rx="5"/>
  <text x="172" y="182" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#111111">Isolated AC/DC 24 VAC → 5 V</text>
  <text x="172" y="198" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">fuse 250–500 mA + MOV</text>

  <rect x="40" y="222" width="265" height="44" fill="#ffffff" stroke="#444444" stroke-width="1.5" rx="5"/>
  <text x="172" y="240" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#111111">3.3 V RS-485 transceiver (DE/RE)</text>
  <text x="172" y="256" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">gas demand on CT-485, as Case A</text>

  <rect x="40" y="280" width="265" height="78" fill="#fffbe8" stroke="#996600" stroke-width="1.5" rx="5"/>
  <text x="172" y="300" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#996600">Relay output stage</text>
  <text x="172" y="317" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#996600">Y1 · Y2 (if supported) · O/B · G</text>
  <text x="172" y="333" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#996600">normally open · demand = energized</text>
  <text x="172" y="348" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#996600">de-energized at boot/reset (pull-downs)</text>

  <rect x="40" y="372" width="265" height="62" fill="#fff4f0" stroke="#bb4422" stroke-width="1.5" rx="5"/>
  <text x="172" y="392" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#bb4422">External hardware watchdog</text>
  <text x="172" y="409" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#bb4422">timeout → DE forced off AND common</text>
  <text x="172" y="424" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#bb4422">relay-coil feed CUT → all relays open</text>

  <rect x="40" y="448" width="265" height="58" fill="#ffffff" stroke="#444444" stroke-width="1.5" rx="5"/>
  <text x="172" y="468" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#111111">Opto-isolated 24 V sense inputs</text>
  <text x="172" y="484" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">D/W (defrost) · Y · G · W monitoring</text>
  <text x="172" y="499" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#555555">detects stuck-closed contacts</text>

  <rect x="40" y="520" width="265" height="36" fill="#ffffff" stroke="#444444" stroke-width="1.5" rx="5"/>
  <text x="172" y="543" font-family="sans-serif" font-size="12.5" text-anchor="middle" fill="#111111">DS18B20 fallback sensor (1-Wire)</text>

  <text x="172" y="582" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#555555">Single wall unit only if enough conductors exist — else split build</text>

  <!-- Wall plate -->
  <line x1="370" y1="60" x2="370" y2="600" stroke="#888888" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="370" y="622" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555555">wall plate — conductor count is a survey item</text>

  <!-- Furnace -->
  <rect x="430" y="60" width="480" height="170" fill="#f7f7f0" stroke="#444444" stroke-width="2" rx="8"/>
  <text x="670" y="84" font-family="sans-serif" font-size="15" font-weight="bold" text-anchor="middle" fill="#111111">Dettson Chinook furnace</text>
  <rect x="450" y="100" width="200" height="56" fill="#ffffff" stroke="#cc7700" stroke-width="1.5" rx="5"/>
  <text x="550" y="122" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#111111">24 VAC transformer (R/C)</text>
  <text x="550" y="140" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">terminal strip: R C W1 Y1 Y/Y2 G V/W2 B</text>
  <rect x="680" y="100" width="210" height="80" fill="#eefbee" stroke="#226622" stroke-width="1.5" rx="5"/>
  <text x="785" y="122" font-family="sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#226622">Certified IFC</text>
  <text x="785" y="139" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#226622">all combustion safeties internal</text>
  <text x="785" y="154" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#226622">gas demand via CT-485 (1/2)</text>
  <text x="785" y="169" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#226622">⚠ never raw 24 VAC on V/W2</text>
  <text x="670" y="212" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#aa3333">⚠ Pending verification: IFC honoring hardwired Y/G/W in communicating mode gates Case B</text>

  <!-- power + bus lines -->
  <line x1="305" y1="186" x2="450" y2="128" stroke="#cc7700" stroke-width="2"/>
  <text x="392" y="148" font-family="sans-serif" font-size="10.5" fill="#cc7700">R / C</text>
  <line x1="305" y1="244" x2="680" y2="170" stroke="#226622" stroke-width="2"/>
  <text x="430" y="246" font-family="sans-serif" font-size="10.5" fill="#226622">CT-485: 1 (A+) / 2 (B−)</text>

  <!-- Coil board -->
  <rect x="430" y="280" width="480" height="130" fill="#ffffff" stroke="#444444" stroke-width="2" rx="8"/>
  <text x="670" y="304" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#111111">Cased-coil board (indoor coil)</text>
  <text x="670" y="324" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#555555">inputs: Y1in · Y2in · B · Gin · (W1in/W2in)   outputs: D (defrost)   SA1 DIP</text>
  <text x="670" y="344" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#884499">H1/H2 = Gree-proprietary link to ODU — do not open or modify</text>
  <rect x="450" y="358" width="440" height="38" fill="#eef4ff" stroke="#2255aa" stroke-width="1.5" rx="5"/>
  <text x="670" y="382" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#2255aa">Condensate FLOAT SWITCH in series with Y — breaks cooling independent of software</text>

  <!-- relay lines -->
  <line x1="305" y1="310" x2="430" y2="330" stroke="#996600" stroke-width="2"/>
  <text x="360" y="306" font-family="sans-serif" font-size="10.5" fill="#996600">Y1 (Y2) O/B G — 24 V calls</text>
  <line x1="305" y1="478" x2="430" y2="392" stroke="#557799" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="350" y="452" font-family="sans-serif" font-size="10.5" fill="#557799">D/W, Y, G, W sense</text>

  <!-- ODU -->
  <rect x="430" y="460" width="480" height="110" fill="#f0f6ff" stroke="#444444" stroke-width="2" rx="8"/>
  <text x="670" y="486" font-family="sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#111111">Gree FLEXX heat pump (outdoor unit)</text>
  <text x="670" y="506" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#555555">NOT a CT-485 node — conventional 24 V control via the coil board</text>
  <text x="670" y="524" font-family="sans-serif" font-size="11.5" font-weight="bold" text-anchor="middle" fill="#aa3333">⚠ reversing valve: B = energized in HEATING (Gree convention)</text>
  <text x="670" y="542" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">equipment protections internal; repeated trips latch manual-reset faults</text>
  <line x1="670" y1="410" x2="670" y2="460" stroke="#884499" stroke-width="2"/>
  <text x="684" y="440" font-family="sans-serif" font-size="10.5" fill="#884499">proprietary + D defrost out</text>

  <text x="470" y="648" font-family="sans-serif" font-size="12" text-anchor="middle" fill="#555555">Gas demand stays on CT-485; the heat pump gets a watchdog-supervised 24 V relay stage. Relays fail OPEN.</text>
</svg>
