<svg xmlns="http://www.w3.org/2000/svg" width="760" height="560" viewBox="0 0 760 560">
  <rect x="0" y="0" width="760" height="560" fill="#ffffff"/>
  <text x="380" y="30" font-family="sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#111111">Wall-plate field wiring</text>

  <!-- Wall plate -->
  <rect x="40" y="70" width="190" height="420" fill="#f7f7f0" stroke="#444444" stroke-width="2" rx="8"/>
  <text x="135" y="96" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#111111">Existing wall plate</text>
  <text x="135" y="113" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">(OEM thermostat location)</text>

  <!-- terminals: solid R C 1 2 -->
  <circle cx="100" cy="150" r="9" fill="#ffffff" stroke="#222222" stroke-width="2"/>
  <text x="135" y="142" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111111">R  24 VAC hot</text>
  <circle cx="100" cy="195" r="9" fill="#ffffff" stroke="#222222" stroke-width="2"/>
  <text x="135" y="187" font-family="sans-serif" font-size="13" font-weight="bold" fill="#111111">C  24 VAC com</text>
  <circle cx="100" cy="250" r="9" fill="#ffffff" stroke="#226622" stroke-width="2"/>
  <text x="135" y="242" font-family="sans-serif" font-size="13" font-weight="bold" fill="#226622">1  Data A (+)</text>
  <circle cx="100" cy="295" r="9" fill="#ffffff" stroke="#226622" stroke-width="2"/>
  <text x="135" y="287" font-family="sans-serif" font-size="13" font-weight="bold" fill="#226622">2  Data B (−)</text>

  <!-- Case B dashed terminals -->
  <circle cx="100" cy="355" r="9" fill="#ffffff" stroke="#996600" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="135" y="360" font-family="sans-serif" font-size="12.5" fill="#996600">Y1 (compressor)</text>
  <circle cx="100" cy="390" r="9" fill="#ffffff" stroke="#996600" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="135" y="395" font-family="sans-serif" font-size="12.5" fill="#996600">Y2 (if supported)</text>
  <circle cx="100" cy="425" r="9" fill="#ffffff" stroke="#996600" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="135" y="430" font-family="sans-serif" font-size="12.5" fill="#996600">O/B (rev. valve)</text>
  <circle cx="100" cy="460" r="9" fill="#ffffff" stroke="#996600" stroke-width="2" stroke-dasharray="3 2"/>
  <text x="135" y="465" font-family="sans-serif" font-size="12.5" fill="#996600">G (blower)</text>

  <!-- Power path -->
  <line x1="109" y1="150" x2="330" y2="150" stroke="#cc7700" stroke-width="2.5"/>
  <rect x="330" y="136" width="96" height="28" fill="#fffbe8" stroke="#996600" stroke-width="1.5" rx="4"/>
  <text x="378" y="154" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#996600">fuse 250–500 mA</text>
  <line x1="426" y1="150" x2="520" y2="150" stroke="#cc7700" stroke-width="2.5"/>
  <line x1="109" y1="195" x2="520" y2="195" stroke="#cc7700" stroke-width="2.5"/>
  <rect x="468" y="158" width="34" height="30" fill="#ffffff" stroke="#996600" stroke-width="1.5" rx="4"/>
  <text x="485" y="177" font-family="sans-serif" font-size="10.5" text-anchor="middle" fill="#996600">MOV</text>
  <line x1="485" y1="150" x2="485" y2="158" stroke="#996600" stroke-width="1.5"/>
  <line x1="485" y1="188" x2="485" y2="195" stroke="#996600" stroke-width="1.5"/>

  <rect x="520" y="120" width="210" height="100" fill="#eefbee" stroke="#226622" stroke-width="2" rx="6"/>
  <text x="625" y="146" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#226622">Isolated AC/DC → 5 V</text>
  <text x="625" y="166" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#226622">IN+ = fused R · IN− = C</text>
  <text x="625" y="184" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#226622">5 V to controller; DC GND isolated</text>
  <text x="625" y="202" font-family="sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#bb4422">never bond DC GND to C</text>

  <!-- Bus path (twisted pair suggestion: two parallel lines) -->
  <line x1="109" y1="250" x2="520" y2="250" stroke="#226622" stroke-width="2.5"/>
  <line x1="109" y1="295" x2="520" y2="295" stroke="#226622" stroke-width="2.5"/>
  <text x="300" y="240" font-family="sans-serif" font-size="11" fill="#226622">keep twisted · tap stub &lt; 0.3 m</text>

  <rect x="520" y="240" width="210" height="130" fill="#f4f8ff" stroke="#2255aa" stroke-width="2" rx="6"/>
  <text x="625" y="264" font-family="sans-serif" font-size="13" font-weight="bold" text-anchor="middle" fill="#2255aa">RS-485 transceiver (3.3 V)</text>
  <text x="625" y="283" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">A ← 1 · B ← 2, via ~10 Ω series</text>
  <text x="625" y="300" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">TVS (SM712/SMBJ) A–B and A/B–GND</text>
  <text x="625" y="317" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">DE/RE resistor-pulled to receive/idle</text>
  <text x="625" y="334" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">bus-side GND referenced to C</text>
  <text x="625" y="351" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#555555">(via barrier or ~100 Ω)</text>

  <!-- bus ref line from C -->
  <line x1="300" y1="195" x2="300" y2="338" stroke="#888888" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="300" y1="338" x2="520" y2="338" stroke="#888888" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="312" y="330" font-family="sans-serif" font-size="10.5" fill="#888888">bus common-mode reference</text>

  <!-- Case B path -->
  <line x1="109" y1="405" x2="520" y2="405" stroke="#996600" stroke-width="2.5" stroke-dasharray="7 5"/>
  <rect x="520" y="385" width="210" height="86" fill="#fffbe8" stroke="#996600" stroke-width="2" rx="6" stroke-dasharray="7 5"/>
  <text x="625" y="409" font-family="sans-serif" font-size="12.5" font-weight="bold" text-anchor="middle" fill="#996600">Case B only — relay stage</text>
  <text x="625" y="427" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#996600">Y1 / Y2 / O-B / G dry contacts</text>
  <text x="625" y="444" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#996600">requires spare wall conductors</text>
  <text x="625" y="461" font-family="sans-serif" font-size="11" text-anchor="middle" fill="#996600">(survey item) — else split build</text>

  <!-- footnotes -->
  <text x="380" y="516" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#555555">No added 120 Ω termination or bias until measured AT THE WALL PLATE — the OEM location may be a terminated bus end.</text>
  <text x="380" y="536" font-family="sans-serif" font-size="11.5" text-anchor="middle" fill="#555555">Ferrules on all stranded conductors. Label every wire before disconnecting the OEM thermostat.</text>
</svg>
