# slytherm_sensors.yaml — bridge Home Assistant room sensors into the SlyTherm
# thermostat's live-sensor contract (issue #22, docs/06). This is the piece that
# makes the wall unit's Sensors screen + "follow me" fusion show REAL rooms.
#
# The thermostat fuses temperatures it receives on
#   slytherm/sensors/<id>/state   {"temp": <°C>[, "occ": <bool>]}   non-retained, heartbeat
# and only uses sensors listed in the retained roster
#   slytherm/config/sensors       {"sensors":[{"id":"living","name":"Living Room","max_age_s":300,"offset":0.0}]}
# For sticky home/away it also subscribes to a RETAINED presence topic (issue #88)
#   slytherm/sensors/<id>/presence {"occupied": <bool>, "last_seen": <unix_s>}  retained
#
# Prereqs: HA's MQTT integration points at the same broker as the thermostat
# (see ha/README.md → "Live sensors"). Then EDIT the `slytherm_rooms` list below
# and reload automations. Occupancy (`occ`) is optional but powers the
# occupancy-weighted "follow me" fusion — map a presence/motion/occupancy
# binary_sensor per room where you have one.

automation:
  # ---- Publish the retained roster: which HA sensors the thermostat may use ----
  # Retained, so a thermostat that reconnects gets it immediately; also re-sent
  # whenever the thermostat announces itself online (LWT availability).
  - id: slytherm_publish_sensor_roster
    alias: "SlyTherm · publish sensor roster"
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: mqtt
        topic: slytherm/availability
        payload: online
    variables:
      # ===================== EDIT ME: your rooms =====================
      # id        topic-safe short id — the MQTT topic segment (wire), stays fixed
      # name      (optional) friendly label shown on the wall unit; falls back to id
      # temp      an HA sensor entity reading °C
      # occ       (optional) a binary_sensor that is 'on' when occupied
      # max_age_s drop from fusion if no update within this many seconds
      # offset    (optional) calibration offset °C applied by the thermostat
      rooms: &slytherm_rooms
        - id: living
          name: Living Room
          temp: sensor.living_room_temperature
          occ: binary_sensor.living_room_occupancy
          max_age_s: 300
          offset: 0.0
        - id: bedroom
          name: Bedroom
          temp: sensor.bedroom_temperature
          occ: binary_sensor.bedroom_occupancy
          max_age_s: 300
          offset: 0.0
        # - id: office
        #   name: Office
        #   temp: sensor.office_temperature
        #   max_age_s: 300
      # ===============================================================
    action:
      - service: mqtt.publish
        data:
          topic: slytherm/config/sensors
          retain: true
          payload: >-
            {"sensors":[
            {%- for r in rooms -%}
            {"id":"{{ r.id }}"
            {%- if r.name is defined %},"name":"{{ r.name }}"{% endif -%}
            ,"max_age_s":{{ r.max_age_s | default(300) }}
            {%- if r.offset is defined %},"offset":{{ r.offset }}{% endif -%}
            }{{ "," if not loop.last }}
            {%- endfor -%}
            ]}

  # ---- Bridge each room sensor into the contract (heartbeat < max_age_s) ----
  - id: slytherm_bridge_room_sensors
    alias: "SlyTherm · bridge room sensors"
    mode: single
    trigger:
      - platform: time_pattern
        seconds: "/30"
    variables:
      rooms: *slytherm_rooms
    action:
      - repeat:
          for_each: "{{ rooms }}"
          sequence:
            - variables:
                t: "{{ states(repeat.item.temp) }}"
            - condition: template
              value_template: "{{ t not in ['unknown', 'unavailable', 'none', ''] }}"
            - service: mqtt.publish
              data:
                topic: "slytherm/sensors/{{ repeat.item.id }}/state"
                payload: >-
                  {"temp":{{ t | float }}
                  {%- if repeat.item.occ is defined and repeat.item.occ -%}
                  ,"occ":{{ 'true' if is_state(repeat.item.occ, 'on') else 'false' }}
                  {%- endif -%}
                  }

  # ---- Publish RETAINED presence per room (issue #88) ----
  # The wall unit keeps a STICKY home/away state: it stays "Present" for 3 hours
  # after the most recent last_seen across ALL rooms, then shows "Nobody home".
  # Because this is RETAINED, a thermostat that reboots/reconnects seeds the
  # last-known presence immediately (people home -> "Present" at boot, not
  # "Nobody home"). Only rooms with an `occ` entity are published.
  #   slytherm/sensors/<id>/presence  {"occupied":<bool>,"last_seen":<unix_s>}  retained
  # occupied  = the room's current occupancy state
  # last_seen = unix seconds of the most recent presence: now() while 'on', else
  #             when the sensor last went 'off' (last_changed). The 1-min
  #             heartbeat keeps it fresh and re-seeds the retained value.
  - id: slytherm_publish_presence
    alias: "SlyTherm · publish room presence (retained)"
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: mqtt
        topic: slytherm/availability
        payload: online
      - platform: time_pattern
        minutes: "/1"
    variables:
      rooms: *slytherm_rooms
    action:
      - repeat:
          for_each: "{{ rooms }}"
          sequence:
            - condition: template
              value_template: "{{ repeat.item.occ is defined and repeat.item.occ }}"
            - service: mqtt.publish
              data:
                topic: "slytherm/sensors/{{ repeat.item.id }}/presence"
                retain: true
                payload: >-
                  {"occupied":{{ 'true' if is_state(repeat.item.occ, 'on') else 'false' }},
                  "last_seen":{{ (as_timestamp(now()) if is_state(repeat.item.occ, 'on')
                  else as_timestamp(states[repeat.item.occ].last_changed, as_timestamp(now()))) | int(0) }}}
