# slytherm_sensors.yaml — bridge Home Assistant room sensors into the SlyTherm
# thermostat's live-sensor contract (issue #22, docs/06). This is the piece that
# makes the wall unit's Sensors screen + "follow me" fusion show REAL rooms.
#
# The thermostat fuses temperatures it receives on
#   slytherm/sensors/<id>/state   {"temp": <°C>[, "occ": <bool>]}   non-retained, heartbeat
# and only uses sensors listed in the retained roster
#   slytherm/config/sensors       {"sensors":[{"id":"living","max_age_s":300,"offset":0.0}]}
#
# Prereqs: HA's MQTT integration points at the same broker as the thermostat
# (see ha/README.md → "Live sensors"). Then EDIT the `slytherm_rooms` list below
# and reload automations. Occupancy (`occ`) is optional but powers the
# occupancy-weighted "follow me" fusion — map a presence/motion/occupancy
# binary_sensor per room where you have one.

automation:
  # ---- Publish the retained roster: which HA sensors the thermostat may use ----
  # Retained, so a thermostat that reconnects gets it immediately; also re-sent
  # whenever the thermostat announces itself online (LWT availability).
  - id: slytherm_publish_sensor_roster
    alias: "SlyTherm · publish sensor roster"
    mode: single
    trigger:
      - platform: homeassistant
        event: start
      - platform: mqtt
        topic: slytherm/availability
        payload: online
    variables:
      # ===================== EDIT ME: your rooms =====================
      # id        short id shown on the wall unit + used in the MQTT topic
      # temp      an HA sensor entity reading °C
      # occ       (optional) a binary_sensor that is 'on' when occupied
      # max_age_s drop from fusion if no update within this many seconds
      # offset    (optional) calibration offset °C applied by the thermostat
      rooms: &slytherm_rooms
        - id: living
          temp: sensor.living_room_temperature
          occ: binary_sensor.living_room_occupancy
          max_age_s: 300
          offset: 0.0
        - id: bedroom
          temp: sensor.bedroom_temperature
          occ: binary_sensor.bedroom_occupancy
          max_age_s: 300
          offset: 0.0
        # - id: office
        #   temp: sensor.office_temperature
        #   max_age_s: 300
      # ===============================================================
    action:
      - service: mqtt.publish
        data:
          topic: slytherm/config/sensors
          retain: true
          payload: >-
            {"sensors":[
            {%- for r in rooms -%}
            {"id":"{{ r.id }}","max_age_s":{{ r.max_age_s | default(300) }}
            {%- if r.offset is defined %},"offset":{{ r.offset }}{% endif -%}
            }{{ "," if not loop.last }}
            {%- endfor -%}
            ]}

  # ---- Bridge each room sensor into the contract (heartbeat < max_age_s) ----
  - id: slytherm_bridge_room_sensors
    alias: "SlyTherm · bridge room sensors"
    mode: single
    trigger:
      - platform: time_pattern
        seconds: "/30"
    variables:
      rooms: *slytherm_rooms
    action:
      - repeat:
          for_each: "{{ rooms }}"
          sequence:
            - variables:
                t: "{{ states(repeat.item.temp) }}"
            - condition: template
              value_template: "{{ t not in ['unknown', 'unavailable', 'none', ''] }}"
            - service: mqtt.publish
              data:
                topic: "slytherm/sensors/{{ repeat.item.id }}/state"
                payload: >-
                  {"temp":{{ t | float }}
                  {%- if repeat.item.occ is defined and repeat.item.occ -%}
                  ,"occ":{{ 'true' if is_state(repeat.item.occ, 'on') else 'false' }}
                  {%- endif -%}
                  }
