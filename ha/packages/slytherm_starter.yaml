# slytherm_starter.yaml — SlyTherm DT-1 starter Home Assistant package (gap G3,
# docs/07-ecobee-gap-analysis.md). Schedules, vacation, filter reminder,
# temp/RH alerts, presence-based Away — everything Ecobee ships out of the box
# that this thermostat deliberately delegates to HA (docs/06 "Schedules and
# presets").
#
# Install: see ha/README.md. Entities this package expects from the
# thermostat's MQTT discovery (lib/HaMqtt):
#   climate.slytherm_hvac   presets: morning / daytime / evening / night / away
#     (roster is published to retained slytherm/config/presets; edit there, NOT here)
#   sensor.slytherm_active_equipment       idle / hp_heat / gas_heat / cool / defrost
#
# You must create yourself (no YAML config flow exists for these):
#   calendar.slytherm_vacation   Settings > Devices & Services > Add > Local Calendar,
#                               name it "SlyTherm Vacation"
#   person.*                    your household phones (used via zone.home below)
#
# Search this file for "EDIT ME" before enabling.

# ---------------------------------------------------------------------------
# 1. Daily preset schedule (time-of-day + weekday -> one of the 4 presets)
# ---------------------------------------------------------------------------
# The presets themselves (setpoints) live in the THERMOSTAT, published to the
# retained slytherm/config/presets topic — the panel and HA both build their
# preset lists from it. HA does NOT define presets; it only SELECTS which one is
# active by time-of-day. To change setpoints, edit the roster (see the SlyTherm
# presets/scheduling reference), NOT this file. To change the *times*, edit the
# trigger list in the "schedule -> preset" automation below + the hour cutoffs
# in the script here (keep them in sync).
#
#   Weekdays: 07:00 morning · 10:00 daytime · 20:00 evening · 23:00 night
#   Weekends: 07:00 daytime · 23:00 night
#   00:00–07:00 = night (carried over from 23:00)
#
# Daytime Away is layered on top by presence (section 6); multi-day Away by the
# vacation calendar (section 3). Both hand back to this schedule when they end.

# "What preset should be active right now?" — computed purely from the wall
# clock, so the block-boundary automation, vacation-end, AND presence-return all
# resume to the correct current block.
script:
  slytherm_apply_scheduled_preset:
    alias: SlyTherm apply scheduled preset
    icon: mdi:calendar-sync
    sequence:
      - service: climate.set_preset_mode
        target:
          entity_id: climate.slytherm_hvac
        data:
          preset_mode: >-
            {% set h = now().hour %}
            {% set weekend = now().weekday() >= 5 %}
            {% if h < 7 or h >= 23 %}night
            {% elif weekend %}daytime
            {% elif h < 10 %}morning
            {% elif h < 20 %}daytime
            {% else %}evening
            {% endif %}

# ---------------------------------------------------------------------------
# Helpers (thresholds, filter counter)
# ---------------------------------------------------------------------------
# No `initial:` anywhere — values must survive HA restarts. On first load each
# slider sits at its minimum; set it once (recommended values in comments).
input_number:
  # Ecobee low-temp alert range 35-68 F -> 1.5-20 C. Recommended: 7 C.
  slytherm_low_temp_alert:
    name: SlyTherm low indoor temp alert
    min: 1.5
    max: 20
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-low
  # Ecobee high-temp alert range 60-104 F -> 15.5-40 C. Recommended: 32 C.
  slytherm_high_temp_alert:
    name: SlyTherm high indoor temp alert
    min: 15.5
    max: 40
    step: 0.5
    unit_of_measurement: "°C"
    icon: mdi:thermometer-high
  # Ecobee humidity alert range 5-95 %RH. Recommended: low 20, high 65.
  slytherm_low_humidity_alert:
    name: SlyTherm low humidity alert
    min: 5
    max: 95
    step: 1
    unit_of_measurement: "%"
    icon: mdi:water-percent-alert
  slytherm_high_humidity_alert:
    name: SlyTherm high humidity alert
    min: 5
    max: 95
    step: 1
    unit_of_measurement: "%"
    icon: mdi:water-percent-alert
  # Blower-hours accumulator since last filter change (section 4 feeds it
  # daily). Never edit by hand except to correct; the reset button zeroes it.
  slytherm_filter_runtime_h:
    name: SlyTherm filter runtime
    min: 0
    max: 20000
    step: 0.01
    unit_of_measurement: "h"
    icon: mdi:air-filter
    mode: box
  # Reminder threshold in blower hours. Installed unit is a Honeywell F300
  # Electronic Air Cleaner (washable cells, NOT a replaceable media filter) —
  # Honeywell calls for cleaning the cells every 6-12 months (at least yearly).
  # 600 h is a rough runtime proxy for that ~6-month cadence; it is only an
  # approximation of a calendar interval — tighten for pets/dust, or reset
  # seasonally by calendar. `initial:` seeds fresh installs only; a system that
  # already has a stored value keeps it, so change the live value in the UI.
  slytherm_filter_alert_hours:
    name: SlyTherm air cleaner service threshold
    initial: 600
    min: 50
    max: 2000
    step: 10
    unit_of_measurement: "h"
    icon: mdi:air-filter

input_button:
  slytherm_filter_reset:
    name: SlyTherm filter changed (reset)
    icon: mdi:air-filter

input_datetime:
  slytherm_filter_last_changed:
    name: SlyTherm filter last changed
    has_date: true
    has_time: false
    icon: mdi:air-filter

# ---------------------------------------------------------------------------
# 4a. Real blower runtime today (feeds the filter counter)
# ---------------------------------------------------------------------------
# Counts hours sensor.slytherm_active_equipment spent actually moving air.
# `defrost` is excluded: minutes per event, noise at filter timescales.
sensor:
  - platform: history_stats
    name: SlyTherm blower runtime today
    entity_id: sensor.slytherm_active_equipment
    state:
      - gas_heat
      - hp_heat
      - cool
    type: time
    start: "{{ today_at() }}"
    end: "{{ now() }}"

automation:
  # -------------------------------------------------------------------------
  # 2. Schedule -> preset
  # -------------------------------------------------------------------------
  - id: slytherm_schedule_to_preset
    alias: "SlyTherm: schedule -> preset"
    description: >-
      At each daily block boundary applies the time-appropriate preset
      (morning/daytime/evening/night; weekends collapse to daytime). Also fires
      at HA start so a reboot lands on the right block. Stands down while a
      vacation event is active or while presence has set Away (they override
      until they end, then hand back via the shared script).
    trigger:
      - platform: time
        at: ["07:00:00", "10:00:00", "20:00:00", "23:00:00"]
      - platform: homeassistant
        event: start
    condition:
      - condition: state
        entity_id: calendar.slytherm_vacation
        state: "off"
      - condition: template
        value_template: >-
          {{ state_attr('climate.slytherm_hvac', 'preset_mode') != 'away' }}
    action:
      - service: script.slytherm_apply_scheduled_preset
    mode: single

  # -------------------------------------------------------------------------
  # 3. Vacation via local calendar
  # -------------------------------------------------------------------------
  # Any event on calendar.slytherm_vacation whose title contains "vacation"
  # holds the away preset for its whole span, then hands back to the schedule.
  - id: slytherm_vacation
    alias: "SlyTherm: vacation calendar -> away"
    trigger:
      - platform: calendar
        entity_id: calendar.slytherm_vacation
        event: start
      - platform: calendar
        entity_id: calendar.slytherm_vacation
        event: end
    condition:
      - condition: template
        value_template: >-
          {{ 'vacation' in (trigger.calendar_event.summary | lower) }}
    action:
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ trigger.event == 'start' }}"
            sequence:
              - service: climate.set_preset_mode
                target:
                  entity_id: climate.slytherm_hvac
                data:
                  preset_mode: away
        default:
          - service: script.slytherm_apply_scheduled_preset
    mode: queued

  # -------------------------------------------------------------------------
  # 4b. Filter reminder keyed to real runtime
  # -------------------------------------------------------------------------
  # Why an accumulator instead of one long history_stats window: the recorder
  # purges history (default 10 days), but a filter interval spans months. So
  # the daily total is banked into input_number.slytherm_filter_runtime_h just
  # before midnight (the final minute of each day is forfeited — irrelevant at
  # a 300 h threshold).
  - id: slytherm_filter_accumulate
    alias: "SlyTherm: filter runtime accumulate (daily)"
    trigger:
      - platform: time
        at: "23:59:00"
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.slytherm_filter_runtime_h
        data:
          value: >-
            {{ (states('input_number.slytherm_filter_runtime_h') | float(0))
               + (states('sensor.slytherm_blower_runtime_today') | float(0)) }}
    mode: single

  - id: slytherm_filter_reminder
    alias: "SlyTherm: filter reminder"
    trigger:
      - platform: numeric_state
        entity_id: input_number.slytherm_filter_runtime_h
        above: input_number.slytherm_filter_alert_hours
    action:
      - service: persistent_notification.create
        data:
          notification_id: slytherm_filter_reminder
          title: "SlyTherm: air cleaner service due"
          message: >-
            Blower runtime is
            {{ states('input_number.slytherm_filter_runtime_h') | float(0) | round(0) }} h
            since the last service
            ({{ states('input_datetime.slytherm_filter_last_changed') }}) —
            past the
            {{ states('input_number.slytherm_filter_alert_hours') | float(0) | round(0) }} h
            interval. Service the Honeywell F300: wash the electronic cells and
            prefilter, replace the postfilter (~6 mo). Then press "SlyTherm
            filter changed (reset)".
    mode: single

  - id: slytherm_filter_reset
    alias: "SlyTherm: filter reset button"
    trigger:
      - platform: state
        entity_id: input_button.slytherm_filter_reset
    action:
      - service: input_number.set_value
        target:
          entity_id: input_number.slytherm_filter_runtime_h
        data:
          value: 0
      - service: input_datetime.set_datetime
        target:
          entity_id: input_datetime.slytherm_filter_last_changed
        data:
          date: "{{ now().date() }}"
      - service: persistent_notification.dismiss
        data:
          notification_id: slytherm_filter_reminder
    mode: single

  # -------------------------------------------------------------------------
  # 5. Low/high indoor temperature + humidity alerts
  # -------------------------------------------------------------------------
  # Indoor temp comes from the climate entity's current_temperature (the
  # firmware's fused control input — slytherm/state/current_temp). The firmware
  # keeps its own non-settable freeze floors (docs/07 §3.5); these mirror
  # Ecobee's user-settable alerts on top.
  - id: slytherm_low_temp_alert
    alias: "SlyTherm: low indoor temperature alert"
    trigger:
      - platform: numeric_state
        entity_id: climate.slytherm_hvac
        attribute: current_temperature
        below: input_number.slytherm_low_temp_alert
        for: "00:05:00"
    action:
      - service: persistent_notification.create
        data:
          notification_id: slytherm_low_temp
          title: "SlyTherm: low indoor temperature"
          message: >-
            Indoor temperature
            {{ state_attr('climate.slytherm_hvac', 'current_temperature') }} °C
            is below the
            {{ states('input_number.slytherm_low_temp_alert') }} °C alert
            threshold. Check that the heat is running.
      # EDIT ME (optional): add a notify.mobile_app_<your_phone> call here to
      # push the same message to your phone.
    mode: single

  - id: slytherm_high_temp_alert
    alias: "SlyTherm: high indoor temperature alert"
    trigger:
      - platform: numeric_state
        entity_id: climate.slytherm_hvac
        attribute: current_temperature
        above: input_number.slytherm_high_temp_alert
        for: "00:05:00"
    action:
      - service: persistent_notification.create
        data:
          notification_id: slytherm_high_temp
          title: "SlyTherm: high indoor temperature"
          message: >-
            Indoor temperature
            {{ state_attr('climate.slytherm_hvac', 'current_temperature') }} °C
            is above the
            {{ states('input_number.slytherm_high_temp_alert') }} °C alert
            threshold. Check cooling / check for equipment faults.
    mode: single

  # The thermostat publishes no indoor-humidity entity of its own; remote
  # sensors may report "hum" but it is not fused into a single entity.
  # EDIT ME: replace sensor.your_indoor_humidity with any %RH sensor you have
  # (e.g. a SNZB-02D from docs/06 "Remote sensors"). Until then this
  # automation simply never triggers.
  - id: slytherm_humidity_alert
    alias: "SlyTherm: indoor humidity alert"
    trigger:
      - platform: numeric_state
        id: low
        entity_id: sensor.your_indoor_humidity
        below: input_number.slytherm_low_humidity_alert
        for: "00:15:00"
      - platform: numeric_state
        id: high
        entity_id: sensor.your_indoor_humidity
        above: input_number.slytherm_high_humidity_alert
        for: "00:15:00"
    action:
      - service: persistent_notification.create
        data:
          notification_id: slytherm_humidity
          title: "SlyTherm: indoor humidity alert"
          message: >-
            Indoor humidity {{ states('sensor.your_indoor_humidity') }} % is
            {{ 'below' if trigger.id == 'low' else 'above' }} the
            {{ states('input_number.slytherm_low_humidity_alert')
               if trigger.id == 'low'
               else states('input_number.slytherm_high_humidity_alert') }} %
            alert threshold.
    mode: single

  # -------------------------------------------------------------------------
  # 6. Presence -> Away (and back)
  # -------------------------------------------------------------------------
  # Uses zone.home, whose state is the number of tracked persons currently
  # home — works as soon as your person entities have phone device trackers,
  # no per-person editing needed. For explicit person selection (e.g. to
  # ignore a person), use the blueprint instead:
  #   ha/blueprints/slytherm_presence_away.yaml
  - id: slytherm_presence_away
    alias: "SlyTherm: everyone left -> away"
    trigger:
      - platform: numeric_state
        entity_id: zone.home
        below: 1
        for: "00:10:00"
    condition:
      - condition: state
        entity_id: calendar.slytherm_vacation
        state: "off"
    action:
      - service: climate.set_preset_mode
        target:
          entity_id: climate.slytherm_hvac
        data:
          preset_mode: away
    mode: single

  - id: slytherm_presence_return
    alias: "SlyTherm: someone home -> resume schedule"
    trigger:
      - platform: numeric_state
        entity_id: zone.home
        above: 0
    condition:
      - condition: state
        entity_id: calendar.slytherm_vacation
        state: "off"
      - condition: template
        value_template: >-
          {{ state_attr('climate.slytherm_hvac', 'preset_mode') == 'away' }}
    action:
      - service: script.slytherm_apply_scheduled_preset
    mode: single

  # -------------------------------------------------------------------------
  # 6. Hold placed -> log + notify
  # -------------------------------------------------------------------------
  # sensor.slytherm_hold is the firmware's auto-discovered hold state; its value
  # is the hold TYPE (none / until_next_preset / two_hours / four_hours /
  # indefinite). A manual setpoint or preset change on the wall unit, a remote,
  # or from HA engages a hold (default: until_next_preset) so the schedule can't
  # stomp the override until the next preset arrives. This fires ONLY on the
  # engage edge (none -> active). The logbook entry is the durable record;
  # persistent_notification is the in-app alert; the commented mobile-push line
  # is your phone notification (fill in your device, see below).
  - id: slytherm_hold_placed
    alias: "SlyTherm: hold placed -> log + notify"
    trigger:
      - platform: state
        entity_id: sensor.slytherm_hold
    condition:
      # engage edge only: new value is a real hold, previous was none/unknown
      - condition: template
        value_template: >-
          {{ trigger.to_state.state not in ['none', 'unknown', 'unavailable']
             and trigger.from_state is not none
             and trigger.from_state.state in ['none', 'unknown', 'unavailable', ''] }}
    action:
      - variables:
          hold_label: >-
            {{ {'until_next_preset': 'until next schedule',
                'two_hours': '2 hours', 'four_hours': '4 hours',
                'indefinite': 'indefinite'}.get(trigger.to_state.state,
                                                 trigger.to_state.state) }}
          preset: "{{ state_attr('climate.slytherm_hvac', 'preset_mode') }}"
          indoor: "{{ state_attr('climate.slytherm_hvac', 'current_temperature') }}"
          setpoints: >-
            {% set t = state_attr('climate.slytherm_hvac', 'temperature') %}
            {% if t is not none %}setpoint {{ t }} °C{% else %}heat
            {{ state_attr('climate.slytherm_hvac', 'target_temp_low') }} / cool
            {{ state_attr('climate.slytherm_hvac', 'target_temp_high') }} °C{% endif %}
          msg: >-
            Hold placed ({{ hold_label }}), overriding the '{{ preset }}'
            schedule. Now {{ setpoints }} (indoor {{ indoor }} °C).
      # 1) durable log entry — shows in Logbook against the thermostat
      - service: logbook.log
        data:
          name: SlyTherm
          entity_id: climate.slytherm_hvac
          message: "{{ msg }}"
      # 2) in-app Home Assistant notification
      - service: persistent_notification.create
        data:
          notification_id: slytherm_hold_placed
          title: "SlyTherm: hold placed ({{ hold_label }})"
          message: "{{ msg }}"
      # 3) MOBILE PUSH — EDIT ME: replace <your_device> with your phone's notify
      #    service, then uncomment these lines. Find the exact name in the HA
      #    Companion App (Settings > Companion App) or Developer Tools > Actions
      #    (search "notify.mobile_app_"). continue_on_error guards a bad name.
      # - service: notify.mobile_app_<your_device>
      #   continue_on_error: true
      #   data:
      #     title: "SlyTherm: hold placed ({{ hold_label }})"
      #     message: "{{ msg }}"
    mode: single
